services:
  db:
    image: mysql:8.0
    container_name: ai-sales-db
    restart: always
    environment:
      MYSQL_DATABASE: sales_page_db
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: root
      MYSQL_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-sales-backend
    restart: always
    user: "1000:1000"
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "php artisan migrate --force && php-fpm"
    depends_on:
      db:
        condition: service_healthy

  nginx-backend:
    image: nginx:stable-alpine
    container_name: ai-sales-nginx
    restart: always
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - backend

  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-sales-worker
    restart: always
    user: "1000:1000"
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    command: php artisan queue:work --verbose --tries=3 --timeout=120
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-sales-frontend
    restart: always
    user: "1000:1000"
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - nginx-backend

volumes:
  db_data:
