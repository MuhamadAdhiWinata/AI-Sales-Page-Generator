services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-sales-backend
    restart: always
    user: "1000:1000"
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx-backend:
    image: nginx:stable-alpine
    container_name: ai-sales-nginx
    restart: always
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - backend

  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-sales-worker
    restart: always
    user: "1000:1000"
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    command: php artisan queue:work --verbose --tries=3 --timeout=120
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-sales-frontend
    restart: always
    user: "1000:1000"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - nginx-backend

volumes:
  db_data:
